<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <style>
        :root {
            --bg-2:     #2b2d31;
            --bg-3:     #1e1f22;
            --text:     #f2f3f5;
            --text-2:   #b5bac1;
            --accent:   #5865f2;
            --accent-h: #4752c4;
            --danger:   #ed4245;
            --font:     "Segoe UI", system-ui, -apple-system, sans-serif;
            --r-sm:     4px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg-2);
            font-family: var(--font);
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 20px;
            gap: 12px;
            -webkit-app-region: drag;
            user-select: none;
        }
        p { color: var(--text); font-size: 13px; font-weight: 600; -webkit-app-region: no-drag; }
        input {
            -webkit-app-region: no-drag;
            width: 100%;
            background: var(--bg-3);
            border: 1.5px solid #3a3c41;
            border-radius: var(--r-sm);
            color: var(--text);
            font-size: 13px;
            font-family: var(--font);
            padding: 7px 10px;
            outline: none;
            transition: border-color 0.15s;
        }
        input:focus { border-color: var(--accent); }
        input.error { border-color: var(--danger); animation: shake 0.3s linear; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25%       { transform: translateX(-4px); }
            75%       { transform: translateX(4px); }
        }
        .actions {
            -webkit-app-region: no-drag;
            display: flex;
            justify-content: flex-end;
            gap: 8px;
        }
        button {
            border: none;
            border-radius: var(--r-sm);
            font-size: 13px;
            font-family: var(--font);
            padding: 5px 14px;
            cursor: pointer;
            outline: none;
        }
        #cancel        { background: transparent; color: var(--text-2); }
        #cancel:hover  { color: var(--text); }
        #confirm       { background: var(--accent); color: #fff; }
        #confirm:hover { background: var(--accent-h); }
    </style>
</head>
<body>
    <p id="label"></p>
    <input id="pwd" type="password" />
    <div class="actions">
        <button id="cancel"></button>
        <button id="confirm"></button>
    </div>
    <script>
        const locale = new URLSearchParams(location.search).get("locale") || "en";
        const i18n = {
            pt: { label: "Senha para DevTools", placeholder: "Digite a senha...", cancel: "Cancelar", confirm: "Abrir" },
            en: { label: "DevTools password",   placeholder: "Enter password...", cancel: "Cancel",   confirm: "Open" },
            es: { label: "Contraseña DevTools",  placeholder: "Ingresa la contraseña...", cancel: "Cancelar", confirm: "Abrir" },
        };
        const t = i18n[locale] ?? i18n.en;

        document.getElementById("label").textContent      = t.label;
        document.getElementById("pwd").placeholder        = t.placeholder;
        document.getElementById("cancel").textContent     = t.cancel;
        document.getElementById("confirm").textContent    = t.confirm;

        const input = document.getElementById("pwd");
        async function submit() {
            const ok = await window.titlebarAPI.openDevtools(input.value);
            if (ok) {
                window.close();
            } else {
                input.classList.add("error");
                input.value = "";
                setTimeout(() => { input.classList.remove("error"); input.focus(); }, 400);
            }
        }
        document.getElementById("confirm").addEventListener("click", submit);
        document.getElementById("cancel").addEventListener("click", () => window.close());
        input.addEventListener("keydown", (e) => {
            if (e.key === "Enter")  submit();
            if (e.key === "Escape") window.close();
        });
        setTimeout(() => input.focus(), 50);
    </script>
</body>
</html>
