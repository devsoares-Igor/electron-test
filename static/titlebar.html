<!doctype html>
<html>
    <head>
        <meta charset="UTF-8" />
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            html,
            body {
                height: 100%;
                background: #313338;
                overflow: hidden;
                -webkit-app-region: no-drag;
                font-family: "Segoe UI", system-ui, sans-serif;
            }
            #drag-bar {
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                height: 32px;
                background: #2b2d31;
                -webkit-app-region: drag;
                display: flex;
                align-items: center;
                padding-right: 148px; /* espaço para os botões nativos min/max/close */
            }
            #reload-btn {
                -webkit-app-region: no-drag;
                margin-left: auto;
                width: 28px;
                height: 28px;
                border: none;
                background: #313338;
                color: #b5bac1;
                cursor: pointer;
                border-radius: 4px;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 0;
                transition:
                    background 0.15s,
                    color 0.15s;
                outline: none;
            }
            #reload-btn:hover {
                background: rgba(255, 255, 255, 0.08);
                color: #f2f3f5;
            }
            #reload-btn:active {
                background: rgba(255, 255, 255, 0.14);
            }
            #reload-btn svg {
                width: 16px;
                height: 16px;
            }
            #reload-btn.spinning svg {
                animation: spin 0.5s linear;
            }
            @keyframes spin {
                from {
                    transform: rotate(0deg);
                }
                to {
                    transform: rotate(360deg);
                }
            }
        </style>
    </head>
    <body>
        <div id="drag-bar">
            <button id="reload-btn" title="Recarregar (F5)">
                <!-- MUI Refresh icon -->
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path
                        d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"
                    />
                </svg>
            </button>
        </div>
        <script>
            const btn = document.getElementById("reload-btn");
            btn.addEventListener("click", () => {
                btn.classList.add("spinning");
                btn.addEventListener("animationend", () => btn.classList.remove("spinning"), {
                    once: true,
                });
                window.titlebarAPI.reload();
            });
            // F5 também recarrega
            document.addEventListener("keydown", (e) => {
                if (e.key === "F5") window.titlebarAPI.reload();
            });
        </script>
    </body>
</html>
