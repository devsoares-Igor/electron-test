<!doctype html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <style>
        :root {
            --bg: #313338;
            --bg-2: #2b2d31;
            --bg-3: #1e1f22;
            --text: #f2f3f5;
            --text-2: #b5bac1;
            --accent: #5865f2;
            --accent-h: #4752c4;
            --danger: #ed4245;
            --font: "Segoe UI", system-ui, -apple-system, sans-serif;
            --r-sm: 4px;
            --r-md: 8px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
            background: var(--bg);
            overflow: hidden;
            -webkit-app-region: no-drag;
            font-family: var(--font);
        }

        #drag-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 32px;
            background: var(--bg-2);
            -webkit-app-region: drag;
            display: flex;
            align-items: center;
            padding-right: 148px;
        }

        #titlebar-buttons {
            margin-left: auto;
            display: flex;
            gap: 2px;
            align-items: center;
        }

        .tb-btn {
            -webkit-app-region: no-drag;
            width: 28px;
            height: 28px;
            border: none;
            background: transparent;
            color: var(--text-2);
            cursor: pointer;
            border-radius: var(--r-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            transition: background 0.15s, color 0.15s;
            outline: none;
        }

        .tb-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            color: var(--text);
        }

        .tb-btn:active {
            background: rgba(255, 255, 255, 0.14);
        }

        .tb-btn svg {
            width: 16px;
            height: 16px;
        }

        #reload-btn.spinning svg {
            animation: spin 0.5s linear;
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        #devtools-modal {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 9999;
            align-items: center;
            justify-content: center;
        }

        #devtools-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.55);
        }

        #devtools-dialog {
            position: relative;
            background: var(--bg-2);
            border: 1px solid var(--bg-3);
            border-radius: var(--r-md);
            padding: 20px 20px 16px;
            width: 260px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
        }

        #devtools-dialog p {
            color: var(--text);
            font-size: 13px;
            font-weight: 600;
            margin: 0;
        }

        #devtools-input {
            width: 100%;
            box-sizing: border-box;
            background: var(--bg-3);
            border: 1.5px solid #3a3c41;
            border-radius: var(--r-sm);
            color: var(--text);
            font-size: 13px;
            font-family: var(--font);
            padding: 6px 8px;
            outline: none;
            transition: border-color 0.15s;
        }

        #devtools-input:focus {
            border-color: var(--accent);
        }

        #devtools-input.error {
            border-color: var(--danger);
            animation: shake 0.3s linear;
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-5px);
            }

            75% {
                transform: translateX(5px);
            }
        }

        #devtools-actions {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
        }

        #devtools-actions button {
            border: none;
            border-radius: var(--r-sm);
            font-size: 13px;
            font-family: var(--font);
            padding: 5px 14px;
            cursor: pointer;
            outline: none;
        }

        #devtools-cancel {
            background: transparent;
            color: var(--text-2);
        }

        #devtools-cancel:hover {
            color: var(--text);
        }

        #devtools-confirm {
            background: var(--accent);
            color: #fff;
        }

        #devtools-confirm:hover {
            background: var(--accent-h);
        }
    </style>
</head>

<body>
    <div id="drag-bar">
        <div id="titlebar-buttons">
            <button id="devtools-btn" class="tb-btn" title="DevTools">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path
                        d="M20 8h-2.81c-.45-.78-1.07-1.45-1.81-1.96l1.41-1.41-1.42-1.42-1.92 1.92C13 5.04 12.51 5 12 5s-1 .04-1.45.13L8.62 3.21 7.2 4.63l1.41 1.41C7.88 6.55 7.27 7.22 6.81 8H4v2h2.09c-.05.33-.09.66-.09 1v1H4v2h2v1c0 .34.04.67.09 1H4v2h2.81c1.04 1.79 2.97 3 5.19 3s4.15-1.21 5.19-3H20v-2h-2.09c.05-.33.09-.66.09-1v-1h2v-2h-2v-1c0-.34-.04-.67-.09-1H20V8zm-4 4v3c0 2.21-1.79 4-4 4s-4-1.79-4-4v-3c0-2.21 1.79-4 4-4s4 1.79 4 4z" />
                </svg>
            </button>
            <button id="reload-btn" class="tb-btn" title="Recarregar (F5)">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path
                        d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z" />
                </svg>
            </button>
        </div>
    </div>
    <script>
        const reloadBtn = document.getElementById("reload-btn");
        reloadBtn.addEventListener("click", () => {
            reloadBtn.classList.add("spinning");
            reloadBtn.addEventListener("animationend", () => reloadBtn.classList.remove("spinning"), { once: true });
            window.titlebarAPI.reload();
        });
        document.addEventListener("keydown", (e) => { if (e.key === "F5") window.titlebarAPI.reload(); });
        document.getElementById("devtools-btn").addEventListener("click", () => window.titlebarAPI.showDevtoolsDialog());

        const locale = new URLSearchParams(location.search).get("locale") || "en";
        const reloadTip = { pt: "Recarregar (F5)", en: "Reload (F5)", es: "Recargar (F5)" };
        document.getElementById("reload-btn").title = reloadTip[locale] ?? reloadTip.en;
    </script>
</body>

</html>
