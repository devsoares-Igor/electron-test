<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <title>Offline</title>
    <style>
        :root {
            --bg:       #313338;
            --bg-2:     #2b2d31;
            --text:     #f2f3f5;
            --text-2:   #b5bac1;
            --text-3:   #80848e;
            --accent:   #5865f2;
            --accent-h: #4752c4;
            --accent-3: #3c45a5;
            --font:     "Segoe UI", system-ui, -apple-system, sans-serif;
            --r-lg:     12px;
            --r-sm:     6px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .card {
            background: var(--bg-2);
            border-radius: var(--r-lg);
            padding: 48px 40px 40px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.45);
        }
        .icon-wrap {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 72px; height: 72px;
            border-radius: 50%;
            background: rgba(88, 101, 242, 0.12);
            margin-bottom: 24px;
            color: var(--accent);
        }
        h5 {
            font-size: 20px;
            font-weight: 500;
            line-height: 1.334;
            color: var(--text);
            margin-bottom: 10px;
        }
        .subtitle {
            font-size: 14px;
            line-height: 1.6;
            color: var(--text-2);
            margin-bottom: 32px;
        }
        .btn {
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: var(--r-sm);
            padding: 8px 24px;
            font-size: 14px;
            font-weight: 500;
            font-family: var(--font);
            letter-spacing: 0.4px;
            cursor: pointer;
            transition: background 0.2s, box-shadow 0.2s;
            box-shadow: 0 2px 6px rgba(88, 101, 242, 0.35);
        }
        .btn:hover  { background: var(--accent-h); box-shadow: 0 4px 12px rgba(88,101,242,0.4); }
        .btn:active { background: var(--accent-3); }
        .divider    { height: 1px; background: rgba(255,255,255,0.08); margin: 32px 0 20px; }
        .caption    { font-size: 11px; color: var(--text-3); }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon-wrap" id="icon-wrap">
            <svg width="36" height="36" viewBox="0 0 24 24" fill="currentColor">
                <path d="M22.99 9C19.15 5.16 13.8 3.76 8.84 4.78l2.52 2.52c3.47-.17 6.99 1.05 9.63 3.7zm-4 4c-1.29-1.29-2.84-2.13-4.49-2.56l3.53 3.53zM2 3.05 5.07 6.1C3.6 6.82 2.22 7.78 1 9l1.99 2c1.24-1.24 2.67-2.16 4.2-2.77l2.24 2.24C7.81 10.89 6.27 11.73 5 13v.01L6.99 15c1.36-1.36 3.14-2.04 4.92-2.06L18.98 20l1.27-1.26L3.29 1.79zM9 17l3 3 3-3c-1.65-1.66-4.34-1.66-6 0"/>
            </svg>
        </div>
        <h5 id="title"></h5>
        <p class="subtitle" id="subtitle"></p>
        <button class="btn" id="retry-btn"></button>
        <div class="divider"></div>
        <p class="caption" id="caption"></p>
    </div>

    <script>
        const params  = new URLSearchParams(location.search);
        const reason  = params.get("reason");
        const locale  = params.get("locale") || "en";

        const ICONS = {
            devserver: `<svg width="36" height="36" viewBox="0 0 24 24" fill="currentColor"><path d="M24 8.98C20.93 5.9 16.69 4 12 4S3.07 5.9 0 8.98L12 21v-9h8.99zM19.59 14l-2.09 2.09L15.41 14 14 15.41l2.09 2.09L14 19.59 15.41 21l2.09-2.08L19.59 21 21 19.59l-2.08-2.09L21 15.41z"/></svg>`,
            offline:   `<svg width="36" height="36" viewBox="0 0 24 24" fill="currentColor"><path d="M22.99 9C19.15 5.16 13.8 3.76 8.84 4.78l2.52 2.52c3.47-.17 6.99 1.05 9.63 3.7zm-4 4c-1.29-1.29-2.84-2.13-4.49-2.56l3.53 3.53zM2 3.05 5.07 6.1C3.6 6.82 2.22 7.78 1 9l1.99 2c1.24-1.24 2.67-2.16 4.2-2.77l2.24 2.24C7.81 10.89 6.27 11.73 5 13v.01L6.99 15c1.36-1.36 3.14-2.04 4.92-2.06L18.98 20l1.27-1.26L3.29 1.79zM9 17l3 3 3-3c-1.65-1.66-4.34-1.66-6 0"/></svg>`,
        };

        const i18n = {
            pt: {
                offlineTitle:    "Sem conexão com a rede",
                offlineSubtitle: "Não foi possível conectar. Verifique seu Wi-Fi ou cabo de rede e tente novamente.",
                offlineCaption:  "Erro de conexão",
                devTitle:        "Servidor de desenvolvimento offline",
                devSubtitle:     "O servidor Vite não está respondendo em localhost:3000. Execute npm run dev no projeto client.",
                devCaption:      "Modo desenvolvimento",
                retry:           "Tentar novamente",
            },
            en: {
                offlineTitle:    "No internet connection",
                offlineSubtitle: "Could not connect. Check your Wi-Fi or network cable and try again.",
                offlineCaption:  "Connection error",
                devTitle:        "Dev server offline",
                devSubtitle:     "The Vite server is not responding at localhost:3000. Run npm run dev in the client project.",
                devCaption:      "Development mode",
                retry:           "Try again",
            },
            es: {
                offlineTitle:    "Sin conexión a internet",
                offlineSubtitle: "No se pudo conectar. Verifica tu Wi-Fi o cable de red e inténtalo de nuevo.",
                offlineCaption:  "Error de conexión",
                devTitle:        "Servidor de desarrollo sin conexión",
                devSubtitle:     "El servidor Vite no responde en localhost:3000. Ejecuta npm run dev en el proyecto client.",
                devCaption:      "Modo desarrollo",
                retry:           "Volver a intentar",
            },
        };

        const t = i18n[locale] ?? i18n.en;

        if (reason === "devserver") {
            document.getElementById("icon-wrap").innerHTML = ICONS.devserver;
            document.getElementById("title").textContent   = t.devTitle;
            document.getElementById("subtitle").textContent = t.devSubtitle;
            document.getElementById("caption").textContent  = t.devCaption;
        } else {
            document.getElementById("icon-wrap").innerHTML = ICONS.offline;
            document.getElementById("title").textContent   = t.offlineTitle;
            document.getElementById("subtitle").textContent = t.offlineSubtitle;
            document.getElementById("caption").textContent  = t.offlineCaption;
        }

        document.getElementById("retry-btn").textContent = t.retry;
        document.getElementById("retry-btn").onclick = () => {
            if (window.electronAPI?.retry) window.electronAPI.retry();
        };
    </script>
</body>
</html>
