<!doctype html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8" />
        <title>Carregando...</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                background: #313338;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                height: 100vh;
                font-family: "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
                overflow: hidden;
                user-select: none;
                -webkit-app-region: drag;
            }

            .logo {
                width: 96px;
                height: 96px;
                margin-bottom: 24px;
            }

            /* MUI Typography h6 */
            .title {
                color: #f2f3f5;
                font-size: 1.25rem;
                font-weight: 500;
                letter-spacing: 0.0075em;
                line-height: 1.6;
                margin-bottom: 4px;
            }

            /* MUI Typography caption */
            .subtitle {
                color: #b5bac1;
                font-size: 0.75rem;
                font-weight: 400;
                letter-spacing: 0.03333em;
                line-height: 1.66;
            }

            /* MUI LinearProgress indeterminate */
            .MuiLinearProgress-root {
                position: fixed;
                bottom: 0;
                left: 0;
                right: 0;
                height: 4px;
                overflow: hidden;
                background-color: rgba(88, 101, 242, 0.24);
            }

            .MuiLinearProgress-bar {
                position: absolute;
                top: 0;
                bottom: 0;
                background-color: #5865f2;
                width: auto;
            }

            .MuiLinearProgress-bar1 {
                animation: indeterminate1 2.1s cubic-bezier(0.65, 0.815, 0.735, 0.395) infinite;
            }

            .MuiLinearProgress-bar2 {
                animation: indeterminate2 2.1s cubic-bezier(0.165, 0.84, 0.44, 1) 1.15s infinite;
            }

            @keyframes indeterminate1 {
                0% {
                    left: -35%;
                    right: 100%;
                }

                60% {
                    left: 100%;
                    right: -90%;
                }

                100% {
                    left: 100%;
                    right: -90%;
                }
            }

            @keyframes indeterminate2 {
                0% {
                    left: -200%;
                    right: 100%;
                }

                60% {
                    left: 107%;
                    right: -8%;
                }

                100% {
                    left: 107%;
                    right: -8%;
                }
            }
        </style>
    </head>

    <body>
        <img class="logo" src="logo_loading.svg" alt="Realms" />
        <p class="title">Realms</p>
        <p class="subtitle">Carregando...</p>

        <div class="MuiLinearProgress-root">
            <div class="MuiLinearProgress-bar MuiLinearProgress-bar1"></div>
            <div class="MuiLinearProgress-bar MuiLinearProgress-bar2"></div>
        </div>
    </body>
</html>
