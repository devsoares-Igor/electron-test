<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <title>Realms</title>
    <style>
        :root {
            --bg:     #313338;
            --text:   #f2f3f5;
            --text-2: #b5bac1;
            --accent: #5865f2;
            --font:   "Segoe UI", system-ui, -apple-system, sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: var(--font);
            overflow: hidden;
            user-select: none;
            -webkit-app-region: drag;
        }

        .logo { width: 96px; height: 96px; margin-bottom: 24px; }

        .title {
            color: var(--text);
            font-size: 1.25rem;
            font-weight: 500;
            letter-spacing: 0.0075em;
            line-height: 1.6;
            margin-bottom: 4px;
        }

        .subtitle {
            color: var(--text-2);
            font-size: 0.75rem;
            font-weight: 400;
            letter-spacing: 0.03333em;
            line-height: 1.66;
        }

        .progress {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            height: 4px;
            overflow: hidden;
            background: rgba(88, 101, 242, 0.24);
        }

        .progress-bar {
            position: absolute;
            top: 0; bottom: 0;
            background: var(--accent);
            width: auto;
        }

        .progress-bar:first-child { animation: p1 2.1s cubic-bezier(.65, .815, .735, .395) infinite; }
        .progress-bar:last-child  { animation: p2 2.1s cubic-bezier(.165, .84, .44, 1) 1.15s infinite; }

        @keyframes p1 {
            0%   { left: -35%;  right: 100%; }
            60%  { left: 100%;  right: -90%; }
            100% { left: 100%;  right: -90%; }
        }
        @keyframes p2 {
            0%   { left: -200%; right: 100%; }
            60%  { left: 107%;  right: -8%;  }
            100% { left: 107%;  right: -8%;  }
        }
    </style>
</head>
<body>
    <img class="logo" src="logo_loading.svg" alt="Realms" />
    <p class="title">Realms</p>
    <p class="subtitle" id="subtitle"></p>

    <div class="progress">
        <div class="progress-bar"></div>
        <div class="progress-bar"></div>
    </div>

    <script>
        const locale = new URLSearchParams(location.search).get("locale") || "en";
        const strings = {
            pt: "Carregando...",
            en: "Loading...",
            es: "Cargando...",
        };
        document.getElementById("subtitle").textContent = strings[locale] ?? strings.en;
    </script>
</body>
</html>
